<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard — WebServ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; }
        header { border-bottom: 1px solid #1f1f1f; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 1.3rem; font-weight: 700; color: #fff; text-decoration: none; }
        .logo span { color: #3b82f6; }
        nav { display: flex; align-items: center; gap: 0.5rem; }
        nav a { color: #9ca3af; text-decoration: none; padding: 0.45rem 1rem; border-radius: 6px; font-size: 0.88rem; transition: all 0.2s; }
        nav a:hover { color: #fff; background: #1a1a1a; }
        .logout { background: transparent; border: 1px solid #2a2a2a; color: #9ca3af !important; }
        .logout:hover { border-color: #ef4444 !important; color: #ef4444 !important; background: transparent !important; }
        .main { max-width: 900px; margin: 4rem auto; padding: 0 2rem; width: 100%; }
        .welcome { margin-bottom: 3rem; }
        .welcome h1 { font-size: 2rem; color: #fff; margin-bottom: 0.5rem; }
        .welcome p { color: #6b7280; font-size: 0.95rem; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.2rem; }
        .card { background: #141414; border: 1px solid #1f1f1f; border-radius: 10px; padding: 1.8rem; text-decoration: none; color: inherit; transition: border-color 0.2s; display: block; }
        .card:hover { border-color: #3b82f6; }
        .card-icon { width: 42px; height: 42px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; margin-bottom: 1rem; }
        .blue { background: #1a2744; }
        .amber { background: #2a1f0a; }
        .card h3 { font-size: 1rem; color: #fff; margin-bottom: 0.4rem; }
        .card p { font-size: 0.85rem; color: #6b7280; line-height: 1.6; }
        .arrow { float: right; color: #374151; }
        .tag { display: inline-block; background: #0d2a1a; color: #4ade80; font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 20px; border: 1px solid #166534; margin-left: 0.5rem; vertical-align: middle; }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">web<span>serv</span></a>
        <nav>
            <a href="/">Home</a>
            <a href="/post_test.html">Upload</a>
            <a href="/index.html" class="logout">Sign Out</a>
        </nav>
    </header>
    <div class="main">
        <div class="welcome">
            <h1>Dashboard <span class="tag">● Logged in</span></h1>
            <p>You are authenticated. Welcome back.</p>
        </div>
        <div class="cards">
            <a href="/post_test.html" class="card">
                <div class="card-icon amber">📤</div>
                <h3>Upload Test <span class="arrow">→</span></h3>
                <p>Test POST request file and text upload functionality.</p>
            </a>
            <a href="/" class="card">
                <div class="card-icon blue">🏠</div>
                <h3>Home <span class="arrow">→</span></h3>
                <p>Go back to the website home page.</p>
            </a>
            <a href="/index.html" class="card">
                <div class="card-icon" style="background:#2a0d0d">🚪</div>
                <h3>Sign Out <span class="arrow">→</span></h3>
                <p>End your session and return to the home page.</p>
            </a>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register — WebServ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; }
        header { border-bottom: 1px solid #1f1f1f; padding: 1.2rem 2rem; }
        .logo { font-size: 1.3rem; font-weight: 700; color: #fff; text-decoration: none; }
        .logo span { color: #3b82f6; }
        .center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .card { background: #141414; border: 1px solid #1f1f1f; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 380px; }
        h2 { font-size: 1.5rem; color: #fff; margin-bottom: 0.4rem; }
        .subtitle { color: #6b7280; font-size: 0.88rem; margin-bottom: 2rem; }
        label { display: block; color: #9ca3af; font-size: 0.82rem; margin-bottom: 0.4rem; letter-spacing: 0.03em; }
        input { width: 100%; background: #1c1c1c; border: 1px solid #3a3a3a; border-radius: 7px; padding: 0.65rem 0.9rem; color: #e0e0e0; font-size: 0.95rem; margin-bottom: 1.2rem; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #3b82f6; }
        button { width: 100%; padding: 0.75rem; background: #3b82f6; color: #fff; border: none; border-radius: 7px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 0.4rem; }
        button:hover { background: #2563eb; }
        .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #6b7280; }
        .footer-link a { color: #3b82f6; text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">web<span>serv</span></a>
    </header>
    <div class="center">
        <div class="card">
            <h2>Create account</h2>
            <p class="subtitle">Fill in the details below to register</p>
            <form action="/added.html" method="POST">
                <label>Username</label>
                <input type="text" name="username" placeholder="your_username" required>
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
                <button type="submit">Create Account</button>
            </form>
            <div class="footer-link">
                Already have an account? <a href="/login.html">Login</a>
            </div>
        </div>
    </div>
</body>
</html>

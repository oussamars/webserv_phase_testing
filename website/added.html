<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Created — WebServ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .icon { font-size: 3.5rem; margin-bottom: 1rem; }
        h2 { font-size: 1.8rem; color: #fff; margin-bottom: 0.5rem; }
        p { color: #6b7280; font-size: 0.95rem; margin-bottom: 2rem; }
        .buttons { display: flex; gap: 0.8rem; }
        a { display: inline-block; padding: 0.65rem 1.5rem; border-radius: 7px; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-ghost { background: transparent; color: #9ca3af; border: 1px solid #2a2a2a; }
        .btn-ghost:hover { color: #fff; border-color: #4a4a4a; }
    </style>
</head>
<body>
    <div class="icon">✅</div>
    <h2>Account Created!</h2>
    <p>Your account has been successfully created.</p>
    <div class="buttons">
        <a href="/signin.html" class="btn-primary">Sign In</a>
        <a href="/" class="btn-ghost">Go Home</a>
    </div>
</body>
</html>

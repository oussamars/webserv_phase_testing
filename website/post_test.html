<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Test — WebServ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; }
        header { border-bottom: 1px solid #1f1f1f; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 1.3rem; font-weight: 700; color: #fff; text-decoration: none; }
        .logo span { color: #3b82f6; }
        nav a { color: #9ca3af; text-decoration: none; margin-left: 1.2rem; font-size: 0.88rem; }
        nav a:hover { color: #fff; }
        .main { max-width: 680px; margin: 3rem auto; padding: 0 2rem; width: 100%; }
        h1 { font-size: 1.8rem; color: #fff; margin-bottom: 0.4rem; }
        .subtitle { color: #6b7280; font-size: 0.9rem; margin-bottom: 2.5rem; }
        .card { background: #141414; border: 1px solid #1f1f1f; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; }
        .card h3 { font-size: 0.95rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1.2rem; font-weight: 600; }
        label { display: block; color: #9ca3af; font-size: 0.82rem; margin-bottom: 0.4rem; }
        textarea { width: 100%; background: #1c1c1c; border: 1px solid #3a3a3a; border-radius: 7px; padding: 0.65rem 0.9rem; color: #e0e0e0; font-size: 0.9rem; margin-bottom: 1rem; outline: none; transition: border-color 0.2s; font-family: inherit; resize: vertical; }
        textarea:focus { border-color: #3b82f6; }
        button { padding: 0.65rem 1.5rem; background: #3b82f6; color: #fff; border: none; border-radius: 7px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2563eb; }
        button:disabled { background: #2a3f6f; cursor: not-allowed; }
        .tag { display: inline-block; background: #1a2744; color: #3b82f6; font-size: 0.72rem; padding: 0.2rem 0.5rem; border-radius: 4px; margin-left: 0.5rem; vertical-align: middle; }
        .result { margin-top: 1rem; padding: 0.8rem 1rem; border-radius: 7px; font-size: 0.85rem; display: none; }
        .result.ok { background: #0d2a1a; border: 1px solid #166534; color: #4ade80; }
        .result.err { background: #2a0d0d; border: 1px solid #991b1b; color: #f87171; }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">web<span>serv</span></a>
        <nav>
            <a href="/">Home</a>
            <a href="/login.html">Login</a>
        </nav>
    </header>
    <div class="main">
        <h1>Upload Test</h1>
        <p class="subtitle">Test POST request functionality on the server.</p>

        <div class="card">
            <h3>Text Body <span class="tag">POST</span></h3>
            <label>Body content</label>
            <textarea id="textBody" rows="5" placeholder="Enter text to send as POST body...">hello from browser</textarea>
            <button onclick="sendText(this)">Send POST</button>
            <div id="textResult" class="result"></div>
        </div>
    </div>

    <script>
        function showResult(el, ok, msg) {
            el.className = 'result ' + (ok ? 'ok' : 'err');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function sendText(btn) {
            var body = document.getElementById('textBody').value;
            var result = document.getElementById('textResult');
            btn.disabled = true;
            btn.textContent = 'Sending…';
            fetch('/', { method: 'POST', body: body, headers: { 'Content-Type': 'text/plain' } })
                .then(function(r) { showResult(result, r.ok || r.status === 201, 'Success — ' + r.status + ' ' + r.statusText); })
                .catch(function(e) { showResult(result, false, 'Error: ' + e.message); })
                .finally(function() { btn.disabled = false; btn.textContent = 'Send POST'; });
        }
    </script>
</body>
</html>

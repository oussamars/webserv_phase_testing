<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>400 - Bad Request</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { text-align: center; }
        .code { font-size: 8rem; font-weight: 700; color: #3b82f6; line-height: 1; }
        .message { font-size: 1.5rem; color: #9ca3af; margin: 1rem 0 2rem; }
        a { display: inline-block; padding: 0.6rem 1.5rem; background: #3b82f6; color: white; text-decoration: none; border-radius: 6px; font-size: 0.95rem; }
        a:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">400</div>
        <div class="message">Bad Request</div>
        <a href="/">Go Home</a>
    </div>

</html>
